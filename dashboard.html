<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إحصائيات النظام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #0F172A; 
            color: #ffffff; 
            padding: 50px; 
        }

        .row { display: flex; gap: 20px; justify-content: center; }

        .stat-card { 
            background: #1E293B; 
            padding: 25px; 
            border-radius: 20px; 
            text-align: center; 
            border-bottom: 4px solid #2563EB; 
            transition: 0.3s;
            width: 180px;
        }

        .stat-card:hover { 
            transform: translateY(-10px); 
            background: #27374D; 
        }

        .stat-value { 
            font-size: 1.8rem; 
            font-weight: 700; 
            margin-top: 10px; 
        }

        .icon-animate { 
            font-size: 2rem; 
            color: #2563EB; 
            display: block; 
            margin-bottom: 15px; 
        }

        h5 { font-size: 0.9rem; color: #94A3B8; margin-bottom: 0; }
    </style>
</head>
<body>

    <div class="row">
        <div class="stat-card">
            <i class="bi bi-cart-plus icon-animate"></i>
            <h5>طلبات اليوم</h5>
            <div class="stat-value">0</div>
        </div>

        <div class="stat-card">
            <i class="bi bi-check2-circle icon-animate"></i>
            <h5>القطع المتوفرة</h5>
            <div class="stat-value">0</div>
        </div>

        <div class="stat-card">
            <i class="bi bi-exclamation-triangle icon-animate"></i>
            <h5>القطع الناقصة</h5>
            <div class="stat-value">0</div>
        </div>

        <div class="stat-card">
            <i class="bi bi-clock-history icon-animate"></i>
            <h5>الطلبات المعلقة</h5>
            <div class="stat-value">0</div>
        </div>

        <div class="stat-card">
            <i class="bi bi-cash-stack icon-animate"></i>
            <h5>مبيعات اليوم</h5>
            <div class="stat-value">0</div>
        </div>

        <div class="stat-card">
            <i class="bi bi-file-earmark-text icon-animate"></i>
            <h5>ورش آجلة</h5>
            <div class="stat-value">0</div>
        </div>
    </div>

</body>
</html>
