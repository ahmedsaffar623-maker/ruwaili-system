<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - مؤسسة الرويعي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background: #000; border-left: 1px solid #333; height: 100vh; padding: 20px; }
        .main-content { padding: 40px; }
        .stat-card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 25px; transition: 0.3s; cursor: pointer; text-decoration: none; display: block; color: white; }
        .stat-card:hover { border-color: #ff4d4d; transform: translateY(-5px); }
        .icon-box { width: 50px; height: 50px; background: #cc0000; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; font-size: 24px; }
        .logout-btn { color: #ff4d4d; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 sidebar d-none d-md-block">
                <img src="1778091248056.png" class="w-100 mb-4">
                <hr>
                <nav class="nav flex-column">
                    <a class="nav-link text-white mb-2" href="#"><i class="fas fa-home me-2"></i> الرئيسة</a>
                    <a class="nav-link text-white mb-2" href="categories.html"><i class="fas fa-th me-2"></i> الأقسام</a>
                    <a class="nav-link text-white mb-2" href="#"><i class="fas fa-file-invoice me-2"></i> الفواتير</a>
                    <hr>
                    <a class="logout-btn" href="index.html"><i class="fas fa-sign-out-alt me-2"></i> تسجيل الخروج</a>
                </nav>
            </div>

            <div class="col-md-9 main-content">
                <h2 class="mb-4">مرحباً بك، أبا دانة 👋</h2>
                <div class="row">
                    <div class="col-md-4 mb-4">
                        <a href="categories.html" class="stat-card">
                            <div class="icon-box"><i class="fas fa-calculator"></i></div>
                            <h4>نظام البيع الذكي</h4>
                            <p class="text-muted">حساب التكلفة وهامش الربح بدقة</p>
                        </a>
                    </div>
                    <div class="col-md-4 mb-4">
                        <div class="stat-card">
                            <div class="icon-box" style="background: #333;"><i class="fas fa-boxes"></i></div>
                            <h4>إدارة المخزون</h4>
                            <p class="text-muted">قريباً: تتبع قطع الغيار</p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-4">
                        <div class="stat-card">
                            <div class="icon-box" style="background: #333;"><i class="fas fa-chart-line"></i></div>
                            <h4>التقارير</h4>
                            <p class="text-muted">قريباً: إحصائيات المبيعات</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
