<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الرويعي الذكي | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0F172A; color: #ffffff; margin: 0; }
        
        /* تأثير الزجاج */
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; }
        
        /* البطاقات */
        .stat-card { background: #1E293B; padding: 20px; border-radius: 15px; text-align: center; border-bottom: 4px solid #2563EB; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); background: #2d3a4f; }
        .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 10px; }
        .icon-animate { font-size: 1.8rem; color: #2563EB; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container mt-4">
    <h3 class="mb-4">مرحباً بك في لوحة التحكم</h3>

    <div class="row g-3 mb-5">
        <div class="col-md-2"><div class="stat-card"><i class="bi bi-cart-plus icon-animate"></i><h5>طلبات اليوم</h5><div class="stat-value">12</div></div></div>
        <div class="col-md-2"><div class="stat-card"><i class="bi bi-check2-circle icon-animate"></i><h5>المتوفر</h5><div class="stat-value">850</div></div></div>
        <div class="col-md-2"><div class="stat-card"><i class="bi bi-exclamation-triangle icon-animate"></i><h5>قطع ناقصة</h5><div class="stat-value text-danger">45</div></div></div>
        <div class="col-md-2"><div class="stat-card"><i class="bi bi-clock-history icon-animate"></i><h5>طلبات معلقة</h5><div class="stat-value">8</div></div></div>
        <div class="col-md-2"><div class="stat-card"><i class="bi bi-cash-stack icon-animate"></i><h5>مبيعات اليوم</h5><div class="stat-value">2,450</div></div></div>
        <div class="col-md-2"><div class="stat-card"><i class="bi bi-file-earmark-text icon-animate"></i><h5>ورش آجلة</h5><div class="stat-value">15</div></div></div>
    </div>

    <div class="glass-card">
        <h4 class="mb-3">نظام البحث الذكي</h4>
        <p class="text-secondary">جاري تجهيز نظام البحث برقم الشاصي (VIN) في الخطوة التالية...</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
