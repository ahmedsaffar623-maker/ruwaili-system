<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم | الإحصائيات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: #0F172A; 
            color: #ffffff; 
            padding: 40px; 
        }

        /* تنسيق البطاقات - الملاحظة 2 */
        .stat-card { 
            background: #1E293B; 
            padding: 25px; 
            border-radius: 15px; 
            text-align: center; 
            border-bottom: 4px solid #2563EB; 
            transition: all 0.3s ease;
        }

        .stat-card:hover { 
            transform: translateY(-10px); 
            background: #27374D; 
        }

        .stat-value { 
            font-size: 1.8rem; 
            font-weight: 700; 
            margin-top: 10px; 
        }

        .icon-animate { 
            font-size: 2rem; 
            color: #2563EB; 
            display: block; 
            margin-bottom: 15px; 
        }

        h5 { font-size: 1rem; color: #94A3B8; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-5">نظرة عامة</h2>
    
    <div class="row g-4">
        <div class="col-md-2">
            <div class="stat-card">
                <i class="bi bi-cart-plus icon-animate"></i>
                <h5>طلبات اليوم</h5>
                <div class="stat-value">12</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="stat-card">
                <i class="bi bi-check2-circle icon-animate"></i>
                <h5>القطع المتوفرة</h5>
                <div class="stat-value">850</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="stat-card">
                <i class="bi bi-exclamation-triangle icon-animate"></i>
                <h5>القطع الناقصة</h5>
                <div class="stat-value text-danger">45</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="stat-card">
                <i class="bi bi-clock-history icon-animate"></i>
                <h5>الطلبات المعلقة</h5>
                <div class="stat-value">8</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="stat-card">
                <i class="bi bi-cash-stack icon-animate"></i>
                <h5>مبيعات اليوم</h5>
                <div class="stat-value">2,450</div>
            </div>
        </div>
        <div class="col-md-2">
            <div class="stat-card">
                <i class="bi bi-file-earmark-text icon-animate"></i>
                <h5>ورش آجلة</h5>
                <div class="stat-value">15</div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
