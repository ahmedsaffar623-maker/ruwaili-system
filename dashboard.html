<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة التحكم | مؤسسة الرويعي</title>

<!-- خط Cairo -->

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome -->

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

/* إعدادات عامة */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#0F172A;
color:white;
padding:40px;
overflow-x:hidden;
}

/* عنوان الصفحة */

.header{
margin-bottom:35px;
}

.header h1{
font-size:35px;
font-weight:800;
margin-bottom:10px;
}

.header p{
color:#94A3B8;
font-size:15px;
}

/* شبكة البطاقات */

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
}

/* البطاقة */

.card{
position:relative;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
overflow:hidden;
transition:.3s;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.card:hover{
transform:translateY(-8px);
border-color:#2563EB;
}

/* خلفية متحركة */

.card::before{
content:'';
position:absolute;
width:180px;
height:180px;
background:#2563EB22;
border-radius:50%;
top:-80px;
left:-80px;
}

/* الأيقونة */

.icon{
width:70px;
height:70px;
display:flex;
justify-content:center;
align-items:center;
border-radius:20px;
font-size:28px;
margin-bottom:20px;
position:relative;
z-index:2;
}

/* ألوان الأيقونات */

.blue{
background:#2563EB22;
color:#60A5FA;
}

.green{
background:#16A34A22;
color:#4ADE80;
}

.orange{
background:#F59E0B22;
color:#FBBF24;
}

.red{
background:#DC262622;
color:#F87171;
}

.purple{
background:#7C3AED22;
color:#A78BFA;
}

.cyan{
background:#0891B222;
color:#22D3EE;
}

/* الرقم */

.card h2{
font-size:38px;
font-weight:800;
margin-bottom:8px;
position:relative;
z-index:2;
}

/* النص */

.card p{
color:#CBD5E1;
font-size:15px;
position:relative;
z-index:2;
}

/* شريط الحالة */

.progress{
width:100%;
height:8px;
background:#1E293B;
border-radius:20px;
margin-top:18px;
overflow:hidden;
position:relative;
z-index:2;
}

.progress span{
display:block;
height:100%;
border-radius:20px;
}

/* ألوان الشرائط */

.progress-blue span{
width:90%;
background:#2563EB;
}

.progress-green span{
width:80%;
background:#16A34A;
}

.progress-orange span{
width:45%;
background:#F59E0B;
}

.progress-red span{
width:30%;
background:#DC2626;
}

.progress-purple span{
width:75%;
background:#7C3AED;
}

.progress-cyan span{
width:60%;
background:#0891B2;
}

/* Responsive */

@media(max-width:768px){

body{
padding:20px;
}

.header h1{
font-size:28px;
}

}

</style>

</head>

<body>

<!-- العنوان -->

<div class="header">

<h1>
لوحة التحكم الذكية
</h1>

<p>
إحصائيات مباشرة لنظام مؤسسة الرويعي لإدارة قطع الغيار
</p>

</div>

<!-- البطاقات -->

<div class="dashboard">

<!-- طلبات اليوم -->

<div class="card">

<div class="icon blue">
<i class="fa-solid fa-cart-shopping"></i>
</div>

<h2>0</h2>

<p>عدد الطلبات اليوم</p>

<div class="progress progress-blue">
<span></span>
</div>

</div>

<!-- القطع المتوفرة -->

<div class="card">

<div class="icon green">
<i class="fa-solid fa-box"></i>
</div>

<h2>0</h2>

<p>القطع المتوفرة بالمستودع</p>

<div class="progress progress-green">
<span></span>
</div>

</div>

<!-- القطع الناقصة -->

<div class="card">

<div class="icon orange">
<i class="fa-solid fa-triangle-exclamation"></i>
</div>

<h2>0</h2>

<p>قطع منخفضة الكمية</p>

<div class="progress progress-orange">
<span></span>
</div>

</div>

<!-- الطلبات المعلقة -->

<div class="card">

<div class="icon red">
<i class="fa-solid fa-clock"></i>
</div>

<h2>0</h2>

<p>الطلبات المعلقة</p>

<div class="progress progress-red">
<span></span>
</div>

</div>

<!-- مبيعات اليوم -->

<div class="card">

<div class="icon purple">
<i class="fa-solid fa-sack-dollar"></i>
</div>

<h2>0</h2>

<p>مبيعات اليوم</p>

<div class="progress progress-purple">
<span></span>
</div>

</div>

<!-- آجل الورش -->

<div class="card">

<div class="icon cyan">
<i class="fa-solid fa-file-invoice-dollar"></i>
</div>

<h2>0</h2>

<p>مبيعات الورش الآجلة</p>

<div class="progress progress-cyan">
<span></span>
</div>

</div>

</div>

</body>
</html>
