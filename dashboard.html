<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - نظام الرويعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0F172A; color: #ffffff; }
        .sidebar { background: #1E293B; height: 100vh; padding: 20px; border-left: 1px solid #334155; }
        .nav-link { color: #94A3B8; font-size: 1.1rem; padding: 15px; border-radius: 10px; transition: 0.3s; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background-color: #2563EB; color: #fff; }
        .stat-card { background: #1E293B; border-radius: 15px; padding: 25px; border-bottom: 5px solid #2563EB; }
        .stat-value { font-size: 2rem; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
<div class="d-flex">
    <div class="sidebar col-md-2">
        <h4 class="text-center mb-4">نظام الرويعي</h4>
        <nav class="nav flex-column">
            <a href="#" class="nav-link active"><i class="bi bi-house-door"></i> الرئيسية</a>
            <a href="#" class="nav-link"><i class="bi bi-box-seam"></i> المخزون</a>
        </nav>
    </div>
    <main class="col-md-10 p-4">
        <div class="row g-4">
            <div class="col-md-3"><div class="stat-card"><h5>المخزون الكلي</h5><div class="stat-value" id="totalItems">...</div></div></div>
        </div>
        <div class="mt-5">
            <table class="table table-dark table-hover align-middle">
                <thead><tr><th>#</th><th>رقم القطعة</th><th>الموقع</th><th>الكمية</th><th>الحالة</th></tr></thead>
                <tbody id="inventoryBody">
                    <tr><td colspan="5" class="text-center">جاري تحميل البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<script>
async function loadInventory() {
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnkWPRCRsJDvFPh6YXTCGZcg8DQs-2b6-ziJKDE_OpFcRB3sB2UeTUkAxe6EPPOJiVYtI_o9H8KyqM/pub?gid=0&single=true&output=csv';
    try {
        const response = await fetch(csvUrl);
        const data = await response.text();
        const rows = data.split('\n').slice(1);
        const tableBody = document.getElementById('inventoryBody');
        tableBody.innerHTML = '';
        rows.forEach((row, index) => {
            const cols = row.split(',');
            if (cols.length < 8) return;
            const partNum = cols[0];
            const qty = parseInt(cols[5]);
            const minQty = parseInt(cols[6]);
            const location = cols[7];
            let status = (qty <= 0) ? '<span class="badge bg-danger">غير متوفر</span>' : (qty <= minQty) ? '<span class="badge bg-warning text-dark">قليل</span>' : '<span class="badge bg-success">متوفر</span>';
            tableBody.innerHTML += `<tr><td>${index+1}</td><td>${partNum}</td><td>${location}</td><td>${qty}</td><td>${status}</td></tr>`;
        });
    } catch (e) { console.error(e); }
}
loadInventory();
</script>
</body>
</html>
