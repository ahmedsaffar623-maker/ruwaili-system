<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أقسام السيارات - مؤسسة الرويعي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: white; padding: 40px 20px; }
        .brand-card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 20px; text-align: center; transition: 0.3s; cursor: pointer; text-decoration: none; display: block; color: white; }
        .brand-card:hover { border-color: #ff4d4d; background: #252525; }
        .brand-name { font-weight: bold; font-size: 20px; margin-top: 10px; text-transform: uppercase; }
        .back-btn { color: #ff4d4d; text-decoration: none; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container text-center">
        <a href="dashboard.html" class="back-btn">← العودة للوحة التحكم</a>
        <h2 class="mb-5">اختر قسم السيارة</h2>
        
        <div class="row g-4">
            <div class="col-6 col-md-3">
                <a href="sales.html?brand=haval" class="brand-card">
                    <div class="brand-name">HAVAL</div>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="sales.html?brand=gac" class="brand-card">
                    <div class="brand-name">GAC MOTOR</div>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="sales.html?brand=changan" class="brand-card">
                    <div class="brand-name">CHANGAN</div>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="sales.html?brand=chery" class="brand-card">
                    <div class="brand-name">CHERY</div>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="sales.html?brand=jetour" class="brand-card">
                    <div class="brand-name">JETOUR</div>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="sales.html?brand=faw" class="brand-card">
                    <div class="brand-name">FAW</div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
