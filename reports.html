<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>التقارير</title>

<style>
body{background:#0F172A;font-family:Cairo;color:white;padding:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}

.card{background:#111827;padding:25px;border-radius:20px;text-align:center}
.card h2{font-size:35px}
</style>

</head>

<body>

<h2>التقارير</h2>

<div class="grid">

<div class="card">
<h2>325</h2>
<p>طلبات اليوم</p>
</div>

<div class="card">
<h2>12,580</h2>
<p>القطع</p>
</div>

<div class="card">
<h2>48,500</h2>
<p>المبيعات</p>
</div>

</div>

</body>
</html>
