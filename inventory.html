<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المخزون</title>

<style>
body{background:#0F172A;font-family:Cairo;color:white;padding:30px}
.box{background:#111827;padding:25px;border-radius:20px}

table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:12px;border-bottom:1px solid #1E293B;text-align:center}

.available{background:#16A34A;padding:6px 12px;border-radius:20px}
.low{background:#F59E0B;padding:6px 12px;border-radius:20px}
.out{background:#DC2626;padding:6px 12px;border-radius:20px}
</style>

</head>

<body>

<div class="box">
<h2>المخزون</h2>

<table>
<tr>
<th>رقم القطعة</th>
<th>الاسم</th>
<th>الكمية</th>
<th>الموقع</th>
<th>الحالة</th>
</tr>

<tr>
<td>GAC-01</td>
<td>فلتر زيت</td>
<td>15</td>
<td>A1</td>
<td><span class="available">متوفر</span></td>
</tr>

<tr>
<td>HAV-02</td>
<td>شمعة</td>
<td>3</td>
<td>B2</td>
<td><span class="low">قليل</span></td>
</tr>

<tr>
<td>JET-03</td>
<td>صدام</td>
<td>0</td>
<td>C3</td>
<td><span class="out">غير متوفر</span></td>
</tr>

</table>

</div>

</body>
</html>
