<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المخزون | مؤسسة الرويعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body { background:#0F172A; color:white; display:flex; min-height:100vh; }
        
        /* القائمة الجانبية الموحدة */
        .sidebar { width: 260px; background: #111827; padding: 30px 20px; border-left: 1px solid #1E293B; }
        .nav-item { padding: 15px; color: #94A3B8; display: flex; align-items: center; gap: 10px; text-decoration: none; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; }
        .nav-item:hover { background: #2563EB; color: white; }
        
        /* محتوى الصفحة */
        .main-content { flex: 1; padding: 40px; }
        .box { background:#111827; padding:25px; border-radius:20px; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th,td { padding:15px; border-bottom:1px solid #1E293B; text-align:center; }
        
        .available { background:#16A34A; padding:6px 12px; border-radius:20px; font-size:12px; }
        .low { background:#F59E0B; padding:6px 12px; border-radius:20px; font-size:12px; }
        .out { background:#DC2626; padding:6px 12px; border-radius:20px; font-size:12px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>مؤسسة الرويعي</h2>
        <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-house"></i> الرئيسية</a>
        <a href="inventory.html" class="nav-item" style="background:#2563EB; color:white;"><i class="fa-solid fa-box"></i> المخزون</a>
        <a href="purchases.html" class="nav-item"><i class="fa-solid fa-cart-shopping"></i> المشتريات</a>
        <a href="sales.html" class="nav-item"><i class="fa-solid fa-file-invoice"></i> المبيعات</a>
    </div>

    <div class="main-content">
        <div class="box">
            <h2>إدارة المخزون</h2>
            <table>
                <tr>
                    <th>رقم القطعة</th>
                    <th>الاسم</th>
                    <th>الكمية</th>
                    <th>الموقع</th>
                    <th>الحالة</th>
                </tr>
                <tr>
                    <td>GAC-01</td>
                    <td>فلتر زيت</td>
                    <td>15</td>
                    <td>A1</td>
                    <td><span class="available">متوفر</span></td>
                </tr>
                <tr>
                    <td>HAV-02</td>
                    <td>شمعة</td>
                    <td>3</td>
                    <td>B2</td>
                    <td><span class="low">قليل</span></td>
                </tr>
                <tr>
                    <td>JET-03</td>
                    <td>صدام</td>
                    <td>0</td>
                    <td>C3</td>
                    <td><span class="out">غير متوفر</span></td>
                </tr>
            </table>
        </div>
    </div>

</body>
</html>
