<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الرويعي الذكي</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; }
        
        /* واجهة الدخول */
        #login-page { display: flex; justify-content: center; align-items: center; height: 100vh; background: #eef2f5; }
        .login-card { background: white; padding: 40px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* النظام الداخلي */
        #main-app { display: none; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #1e293b; color: white; padding: 20px; }
        .nav-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #334155; }
        .content { flex: 1; padding: 30px; }
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <h2>الرويعي الذكي 🚗</h2>
            <p>نظام إدارة قطع غيار السيارات الصينية</p>
            <input type="text" id="user" placeholder="اسم المستخدم">
            <input type="password" id="pass" placeholder="كلمة المرور">
            <button class="btn-login" onclick="login()">دخول النظام</button>
        </div>
    </div>

    <div id="main-app">
        <div class="sidebar">
            <h3>القائمة</h3>
            <div class="nav-item" onclick="show('dashboard')">لوحة التحكم</div>
            <div class="nav-item" onclick="show('inventory')">المخزون</div>
            <div class="nav-item" onclick="show('sales')">المبيعات</div>
            <div class="nav-item" onclick="show('purchases')">المشتريات</div>
            <div class="nav-item" onclick="show('reports')">التقارير</div>
        </div>
        <div class="content">
            <div id="dashboard" class="page active"><h1>لوحة التحكم</h1><p>مرحباً بك في نظامك الخاص.</p></div>
            <div id="inventory" class="page"><h1>إدارة المخزون</h1></div>
            <div id="sales" class="page"><h1>المبيعات</h1></div>
            <div id="purchases" class="page"><h1>المشتريات</h1></div>
            <div id="reports" class="page"><h1>التقارير والإقرار الضريبي</h1></div>
        </div>
    </div>

    <script>
        // قاعدة بيانات محلية
        let db = { items: [], sales: [] };

        function login() {
            // تحقق بسيط
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        }

        function show(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
