<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | مؤسسة الرويعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body { height:100vh; display:flex; justify-content:center; align-items:center; background:#0F172A; overflow:hidden; position:relative; }
        body::before { content:''; position:absolute; width:600px; height:600px; background:#2563EB; border-radius:50%; top:-250px; left:-200px; filter:blur(150px); opacity:.4; }
        body::after { content:''; position:absolute; width:500px; height:500px; background:#16A34A; border-radius:50%; bottom:-200px; right:-150px; filter:blur(150px); opacity:.3; }
        .login-box { width:430px; padding:45px; border-radius:30px; background:rgba(255,255,255,0.08); backdrop-filter:blur(25px); border:1px solid rgba(255,255,255,0.08); box-shadow:0 20px 50px rgba(0,0,0,0.4); color:white; position:relative; z-index:10; }
        .logo { text-align:center; margin-bottom:25px; }
        .logo img { width:90px; margin-bottom:15px; }
        .logo h1 { font-size:30px; font-weight:800; margin-bottom:8px; }
        .logo span { color:#3B82F6; }
        .logo p { font-size:14px; color:#CBD5E1; line-height:1.8; }
        .brands { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin:25px 0; }
        .brand { padding:8px 14px; border-radius:50px; background:rgba(255,255,255,0.08); font-size:12px; color:#E2E8F0; border:1px solid rgba(255,255,255,0.08); }
        .input-box { position:relative; margin-bottom:18px; }
        .input-box i { position:absolute; right:18px; top:50%; transform:translateY(-50%); color:#94A3B8; }
        .input-box input { width:100%; padding:16px 50px 16px 15px; border:none; outline:none; border-radius:15px; background:#1E293B; color:white; font-size:15px; transition:.3s; }
        .input-box input:focus { border:1px solid #2563EB; box-shadow:0 0 15px #2563EB55; }
        .options { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; font-size:13px; color:#CBD5E1; }
        .options a { color:#60A5FA; text-decoration:none; }
        .login-btn { width:100%; padding:16px; border:none; border-radius:15px; background:linear-gradient(135deg,#2563EB,#1D4ED8); color:white; font-size:16px; font-weight:700; cursor:pointer; transition:.3s; box-shadow:0 10px 25px rgba(37,99,235,.4); }
        .login-btn:hover { transform:translateY(-3px); }
        .footer { margin-top:25px; text-align:center; font-size:12px; color:#94A3B8; }
        @media(max-width:500px) { .login-box { width:95%; padding:30px 20px; } }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
        <h1>مؤسسة <span>الرويعي</span></h1>
        <p>نظام مؤسسة الرويعي الذكي لإدارة قطع الغيار</p>
    </div>

    <div class="brands">
        <div class="brand">GAC MOTOR</div>
        <div class="brand">HAVAL</div>
        <div class="brand">Changan</div>
        <div class="brand">Jetour</div>
    </div>

    <form id="loginForm">
        <div class="input-box">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" placeholder="اسم المستخدم" required>
        </div>
        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="كلمة المرور" required>
        </div>
        <div class="options">
            <label><input type="checkbox"> تذكرني</label>
            <a href="#">نسيت كلمة المرور؟</a>
        </div>
        <button type="submit" class="login-btn">
            <i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول
        </button>
    </form>

    <div class="footer">© 2026 مؤسسة حسين حسن الرويعي لقطع الغيار</div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if (user === 'admin' && pass === '123') {
            window.location.href = 'dashboard.html';
        } else {
            alert('اسم المستخدم أو كلمة المرور غير صحيحة');
        }
    });
</script>

</body>
</html>
