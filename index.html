<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مؤسسة الرويعي - تسجيل الدخول الموحد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body { background-color: #f8fafc; min-height:100vh; }

        /* صفحة الدخول (الهوية الرقمية) */
        #login-page { display:flex; justify-content:center; align-items:center; height:100vh; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid #0c2340; }
        .logo-text { font-size: 24px; font-weight: bold; color: #0c2340; margin-bottom: 20px; }
        .options-container { display: flex; gap: 20px; margin-top: 20px; }
        .option-box { flex: 1; padding: 20px; border: 1px solid #e2e8f0; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .option-box:hover { border-color: #0c2340; background: #f1f5f9; }
        .btn-login { background: #0c2340; color: white; border: none; padding: 10px 25px; border-radius: 5px; margin-top: 15px; width: 100%; cursor: pointer; font-family: 'Cairo'; }

        /* النظام الداخلي */
        #app-content { display:none; flex; background:#0f172a; min-height:100vh; color:white; }
        .sidebar { width: 260px; background: #111827; padding: 20px; border-left: 1px solid #1e293b; }
        .nav-item { padding: 15px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 10px; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #2563eb; color: white; }
        .main-content { flex: 1; padding: 40px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background:#111827; padding:25px; border-radius:20px; border: 1px solid #1e293b; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-card">
            <div class="logo-text">مؤسسة الرويعي</div>
            <h3>التسجيل في الهوية الرقمية الموحدة</h3>
            <div class="options-container">
                <div class="option-box">
                    <p>النفاذ الوطني</p>
                    <button class="btn-login" onclick="login()">دخول الأفراد</button>
                </div>
                <div class="option-box">
                    <p>أبشر أعمال</p>
                    <button class="btn-login" onclick="login()">دخول المنشآت</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-content">
        <div class="sidebar">
            <h2>القائمة</h2>
            <div class="nav-item active" onclick="showpage('dashboard', this)"><i class="fa-solid fa-house"></i> الرئيسية</div>
            <div class="nav-item" onclick="showpage('inventory', this)"><i class="fa-solid fa-box"></i> المخزون</div>
            <div class="nav-item" onclick="showpage('sales', this)"><i class="fa-solid fa-file-invoice"></i> المبيعات</div>
        </div>

        <div class="main-content">
            <div id="dashboard" class="page active"><div class="card"><h2>لوحة التحكم</h2><p>مرحباً بك في نظام مؤسسة الرويعي.</p></div></div>
            <div id="inventory" class="page"><div class="card"><h2>المخزون</h2><p>إدارة القطع والكميات.</p></div></div>
            <div id="sales" class="page"><div class="card"><h2>المبيعات</h2><p>سجل المبيعات والعملاء.</p></div></div>
        </div>
    </div>

    <script>
        function login() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
        }
        function showpage(pageid, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.getElementById(pageid).classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
