<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الرويعي الذكي المتكامل</title>
    <style>
        :root { --primary: #0c2340; --accent: #d4af37; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; }
        .sidebar { width: 280px; background: var(--primary); color: white; height: 100vh; padding: 20px; }
        .nav-item { padding: 15px; cursor: pointer; color: #ccc; border-bottom: 1px solid #1e3a5f; transition: 0.3s; }
        .nav-item:hover { color: white; background: #1e3a5f; }
        .content { flex: 1; padding: 30px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; border: 2px solid var(--primary); border-radius: 8px; font-size: 16px; margin: 15px 0; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: var(--primary); color: white; padding: 12px; }
        td { border: 1px solid #ddd; padding: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--accent); text-align:center;">الرويعي للنظم</h2>
    <div class="nav-item" onclick="location.reload()">🔍 المحرك الذكي (الشاصي)</div>
</div>

<div class="content">
    <div class="card">
        <h1>البحث الذكي في فهرس الموديلات</h1>
        <input type="text" id="vinInput" placeholder="أدخل رقم الشاصي أو اسم الموديل (مثلاً: GA6, EMZOMO)..." onkeyup="smartSearch()">
        <div id="smartResult"></div>
    </div>
</div>

<script>
    // قاعدة البيانات الشاملة من ملف "فهرس البحث"
    const catalogMap = {
        "EMZOMO": "https://drive.google.com/file/d/1k-01150grxgsY3TemAwrUHa7BelHgos-/view",
        "EMKO": "https://drive.google.com/file/d/1MMvcy8AbOyTgP74jzocKgN7pJvdG_50U/view",
        "EMPWA": "https://drive.google.com/file/d/1h0lyX5OTfqysl93KS-2dxiFZ4OmwQB9u/view",
        "GA6": "https://drive.google.com/file/d/1xkMbMK31AIIZXx-lhdwl0jmhSlx-_EtO/view",
        "GA8": "https://drive.google.com/file/d/1PIDaMVFK3aqChNzQ26vB800EWnAVLEXv/view",
        "GA4": "https://drive.google.com/file/d/1yTIYDizTfRHU7j0f5lznqlyr2-dCaDKj/view",
        "GA3S": "https://drive.google.com/file/d/1kTqvWOYgJGf8U3ynKWmp1dgT2q4vnvXm/view",
        "GN6": "https://drive.google.com/file/d/1yomkoP5XzuiQTu2WldGKcZ2xnRYBhYUC/view",
        "GN8": "https://drive.google.com/file/d/10RAU5iT3Bp7ejoZsUG8Y2ts1abGWG-Ep/view",
        "GS4": "https://drive.google.com/file/d/1xzZXrFPwbl3xj9NMOhqKWrQV4NmRMd/view"
    };

    function smartSearch() {
        let input = document.getElementById('vinInput').value.toUpperCase();
        let resDiv = document.getElementById('smartResult');
        
        // البحث عن الموديل ضمن القائمة المدمجة
        let foundModel = Object.keys(catalogMap).find(m => input.includes(m));
        
        if (foundModel) {
            resDiv.innerHTML = `
                <div style="margin-top:20px; padding:20px; background:#f0f7ff; border-radius:10px; border-right:5px solid var(--primary);">
                    <h3>✅ الموديل المكتشف: ${foundModel}</h3>
                    <a href="${catalogMap[foundModel]}" target="_blank" 
                       style="display:inline-block; padding:15px 30px; background:var(--primary); color:white; text-decoration:none; border-radius:5px; margin-top:10px; font-weight:bold;">
                       📂 فتح كتالوج قطع غيار ${foundModel}
                    </a>
                </div>`;
        } else if (input.length > 2) {
            resDiv.innerHTML = `<p style="color:red; margin-top:20px;">جاري البحث في الفهرس...</p>`;
        } else {
            resDiv.innerHTML = "";
        }
    }
</script>
</body>
</html>
