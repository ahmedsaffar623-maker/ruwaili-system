<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - نظام الرويعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0F172A; color: #ffffff; }
        
        /* القائمة الجانبية */
        .sidebar { background: #1E293B; height: 100vh; padding: 20px; border-left: 1px solid #334155; }
        .nav-link { color: #94A3B8; font-size: 1.1rem; padding: 15px; border-radius: 10px; transition: 0.3s; margin-bottom: 5px; }
        .nav-link:hover, .nav-link.active { background-color: #2563EB; color: #fff; }
        
        /* البطاقات الإحصائية */
        .stat-card { background: #1E293B; border-radius: 15px; padding: 25px; border-bottom: 5px solid #2563EB; transition: 0.3s; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #fff; margin-top: 10px; }
        
        /* جدول المخزون */
        .main-content { padding: 30px; }
        .table-custom { background: #1E293B; color: white; border-radius: 15px; overflow: hidden; }
    </style>
</head>
<body>

<div class="d-flex">
    <div class="sidebar col-md-2">
        <h4 class="text-center mb-4">نظام الرويعي</h4>
        <nav class="nav flex-column">
            <a href="#" class="nav-link active"><i class="bi bi-house-door"></i> الرئيسية</a>
            <a href="#" class="nav-link"><i class="bi bi-cart"></i> الطلبات</a>
            <a href="#" class="nav-link"><i class="bi bi-box-seam"></i> المخزون</a>
            <a href="#" class="nav-link"><i class="bi bi-people"></i> العملاء</a>
            <a href="#" class="nav-link"><i class="bi bi-tools"></i> الورش</a>
            <a href="#" class="nav-link"><i class="bi bi-graph-up"></i> التقارير</a>
            <a href="#" class="nav-link"><i class="bi bi-gear"></i> الإعدادات</a>
        </nav>
    </div>
        
        <div class="row g-4 mt-2">
            <div class="col-md-3"><div class="stat-card"><h5>طلبات اليوم</h5><div class="stat-value">15</div></div></div>
            <div class="col-md-3"><div class="stat-card"><h5>المبيعات</h5><div class="stat-value">12,400 ر.س</div></div></div>
            <div class="col-md-3"><div class="stat-card"><h5>قطع ناقصة</h5><div class="stat-value text-danger">08</div></div></div>
            <div class="col-md-3"><div class="stat-card"><h5>طلبات ورش</h5><div class="stat-value text-warning">05</div></div></div>
        </div>

        <div class="mt-5">
            <h4>آخر التحديثات</h4>
            </div>
    </main>
</div>
