<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول - مؤسسة الرويعي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        .logo-img { max-width: 180px; display: block; margin: 0 auto 20px auto; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="1778091248056.png" class="logo-img" alt="شعار المؤسسة">
        
        <h4 class="text-center mb-4">بوابة الدخول</h4>
        <input type="text" id="user" class="form-control mb-3" placeholder="اسم المستخدم">
        <input type="password" id="pass" class="form-control mb-3" placeholder="كلمة المرور">
        <button onclick="login()" class="btn btn-primary w-100">دخول</button>
    </div>
    <script>
        function login() {
            // بيانات الدخول الافتراضية
            if(document.getElementById('user').value == "admin" && document.getElementById('pass').value == "123") {
                window.location.href = "dashboard.html";
            } else { alert("اسم المستخدم أو كلمة المرور غير صحيحة"); }
        }
    </script>
</body>
</html>
