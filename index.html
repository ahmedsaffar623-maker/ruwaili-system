<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مؤسسة الرويعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body { background:#0f172a; color:white; display:flex; min-height:100vh; }
        
        /* القائمة الجانبية */
        .sidebar { width: 260px; background: #111827; padding: 20px; border-left: 1px solid #1e293b; }
        .nav-item { padding: 15px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 10px; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #2563eb; color: white; }
        
        /* المحتوى */
        .main-content { flex: 1; padding: 40px; }
        .page { display: none; }
        .page.active { display: block; }
        
        /* البطاقات والجداول */
        .card { background:#111827; padding:25px; border-radius:20px; border: 1px solid #1e293b; margin-bottom: 20px; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th,td { padding:15px; border-bottom:1px solid #1e293b; text-align:center; }
        
        /* الألوان للحالات */
        .available { background:#16a34a; padding:5px 12px; border-radius:20px; font-size:12px; }
        .low { background:#f59e0b; padding:5px 12px; border-radius:20px; font-size:12px; }
        .out { background:#dc2626; padding:5px 12px; border-radius:20px; font-size:12px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>مؤسسة الرويعي</h2>
        <div class="nav-item active" onclick="showpage('dashboard', this)"><i class="fa-solid fa-house"></i> الرئيسية</div>
        <div class="nav-item" onclick="showpage('inventory', this)"><i class="fa-solid fa-box"></i> المخزون</div>
        <div class="nav-item" onclick="showpage('sales', this)"><i class="fa-solid fa-file-invoice"></i> المبيعات</div>
    </div>

    <div class="main-content">
        <div id="dashboard" class="page active">
            <h2 style="margin-bottom:20px;">لوحة التحكم</h2>
            <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:20px;">
                <div class="card"><h2 style="color:#60a5fa;">150</h2><p>إجمالي القطع</p></div>
                <div class="card"><h2 style="color:#4ade80;">24</h2><p>طلبات اليوم</p></div>
                <div class="card"><h2 style="color:#fbbf24;">12</h2><p>قطع منخفضة الكمية</p></div>
            </div>
        </div>
        
        <div id="inventory" class="page">
            <div class="card">
                <h2>إدارة المخزون</h2>
                <table>
                    <tr><th>القطعة</th><th>الكمية</th><th>الحالة</th></tr>
                    <tr><td>فلتر زيت</td><td>15</td><td><span class="available">متوفر</span></td></tr>
                    <tr><td>شمعة</td><td>3</td><td><span class="low">قليل</span></td></tr>
                    <tr><td>صدام</td><td>0</td><td><span class="out">غير متوفر</span></td></tr>
                </table>
            </div>
        </div>

        <div id="sales" class="page">
            <div class="card">
                <h2>المبيعات</h2>
                <p>قسم المبيعات قيد التجهيز.</p>
            </div>
        </div>
    </div>

    <script>
        function showpage(pageid, element) {
            // إخفاء كل الصفحات
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // إزالة التحديد من كل الأزرار
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            // إظهار الصفحة المحددة
            document.getElementById(pageid).classList.add('active');
            // تحديد الزر الحالي
            element.classList.add('active');
        }
    </script>
</body>
</html>
