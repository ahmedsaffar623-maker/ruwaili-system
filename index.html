<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مؤسسة الرويعي الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Cairo', sans-serif; background: #0F172A; height: 100vh; display: flex; justify-content: center; align-items: center; color: #ffffff; }
        .login-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #1E293B; border: 1px solid #334155; border-radius: 10px; color: #fff; box-sizing: border-box; }
        .btn-login { background: #2563EB; color: white; width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .brands { display: flex; justify-content: center; gap: 15px; margin-top: 30px; color: #64748B; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>نظام مؤسسة الرويعي الذكي</h2>
        <p>لإدارة قطع الغيار والخدمات اللوجستية</p>
        <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
            <input type="text" placeholder="اسم المستخدم" required>
            <input type="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn-login">دخول النظام</button>
        </form>
        <div class="brands">
            <span>GAC</span> | <span>HAVAL</span> | <span>CHANGAN</span> | <span>JETOUR</span>
        </div>
    </div>
</body>
</html>
