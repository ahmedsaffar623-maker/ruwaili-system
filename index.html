<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الرويعي الذكي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a1a1a; color: white; min-height: 100vh; display: flex; align-items: center; }
        .login-container { background: #000; border: 1px solid #ff4d4d; border-radius: 20px; padding: 40px; width: 100%; max-width: 450px; margin: auto; }
        .btn-custom { background: #cc0000; color: white; font-weight: bold; }
        .btn-custom:hover { background: #ff0000; }
        input { background: #333 !important; border: none !important; color: white !important; }
    </style>
</head>
<body>
    <div class="login-container shadow-lg">
        <img src="1778091248056.png" class="w-100 mb-4">
        <h4 class="text-center mb-4">تسجيل الدخول</h4>
        <input type="text" id="user" class="form-control mb-3" placeholder="اسم المستخدم">
        <input type="password" id="pass" class="form-control mb-3" placeholder="كلمة المرور">
        <button onclick="login()" class="btn btn-custom w-100 py-2">دخول النظام</button>
    </div>
    <script>
        function login() {
            if(document.getElementById('user').value == "admin" && document.getElementById('pass').value == "123") {
                window.location.href = "dashboard.html";
            } else { alert("بيانات غير صحيحة"); }
        }
    </script>
</body>
</html>
