<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام مؤسسة الرويعي الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: #0F172A;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h2 { font-weight: 700; margin-bottom: 10px; }
        p { color: #94A3B8; margin-bottom: 30px; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            box-sizing: border-box;
        }

        .btn-login {
            background: #2563EB;
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover { background: #1d4ed8; }

        .brands {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            color: #64748B;
            font-size: 0.9rem;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>مؤسسة الرويعي</h2>
        <p>نظام إدارة قطع الغيار الذكي</p>
        
        <form>
            <input type="text" placeholder="اسم المستخدم" required>
            <input type="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn-login">دخول النظام</button>
        </form>

        <div class="brands">
            <span>GAC</span> | <span>HAVAL</span> | <span>CHANGAN</span> | <span>JETOUR</span>
        </div>
    </div>

</body>
</html>
