<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مؤسسة الرويعي الذكي</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin:0; display:flex; background:#f4f7f6; }
        .sidebar { width: 250px; background: #0c2340; color: white; height: 100vh; padding: 20px; }
        .nav-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #1e3a5f; }
        .nav-item:hover { background: #1e3a5f; }
        .content { flex: 1; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .alert { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>مؤسسة الرويعي</h2>
    <div class="nav-item" onclick="show('dashboard')">لوحة التحكم</div>
    <div class="nav-item" onclick="show('inventory')">المخزون</div>
    <div class="nav-item" onclick="show('sales')">المبيعات</div>
    <div class="nav-item" onclick="show('purchases')">المشتريات</div>
    <div class="nav-item" onclick="show('payments')">سندات قبض</div>
    <div class="nav-item" onclick="show('reports')">التقارير</div>
</div>

<div class="content">
    <div id="dashboard" class="page">
        <h1>لوحة التحكم</h1>
        <div class="card" id="alerts"><h3>تنبيهات المخزون:</h3></div>
    </div>
    <div id="inventory" class="page" style="display:none;"><h1>المخزون</h1></div>
    <div id="sales" class="page" style="display:none;"><h1>المبيعات</h1></div>
    <div id="purchases" class="page" style="display:none;"><h1>المشتريات</h1></div>
    <div id="payments" class="page" style="display:none;"><h1>سندات القبض</h1></div>
    <div id="reports" class="page" style="display:none;"><h1>التقارير</h1></div>
</div>

<script>
    // قاعدة البيانات المركزية
    let db = JSON.parse(localStorage.getItem('mySystemDB')) || {
        items: [], sales: [], purchases: [], payments: []
    };

    function show(pageId) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(pageId).style.display = 'block';
    }

    // فحص التنبيهات تلقائياً
    function checkAlerts() {
        let lowStock = db.items.filter(i => i.stock < 5);
        let alertDiv = document.getElementById('alerts');
        lowStock.forEach(i => {
            alertDiv.innerHTML += `<p class="alert">تنبيه: ${i.name} وصل لحد الطلب (${i.stock})</p>`;
        });
    }

    checkAlerts();
</script>
</body>
</html>
