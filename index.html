<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مؤسسة الرويعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
        body { background:#0f172a; color:white; min-height:100vh; }
        
        /* صفحة الدخول */
        #login-page { display:flex; justify-content:center; align-items:center; height:100vh; }
        .login-box { background:#111827; padding:40px; border-radius:20px; width:350px; text-align:center; border: 1px solid #1e293b; }
        input { width:100%; padding:12px; margin:10px 0; border-radius:10px; border:none; background:#1e293b; color:white; }
        button { width:100%; padding:12px; background:#2563eb; color:white; border:none; border-radius:10px; cursor:pointer; margin-top:10px; }

        /* النظام الداخلي */
        #app-content { display:none; flex; }
        .sidebar { width: 260px; background: #111827; padding: 20px; border-left: 1px solid #1e293b; min-height:100vh; }
        .nav-item { padding: 15px; color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 10px; border-radius: 10px; margin-bottom: 5px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #2563eb; color: white; }
        .main-content { flex: 1; padding: 40px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background:#111827; padding:25px; border-radius:20px; border: 1px solid #1e293b; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="login-page">
        <div class="login-box">
            <h2>تسجيل الدخول</h2>
            <input type="text" placeholder="اسم المستخدم">
            <input type="password" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
        </div>
    </div>

    <div id="app-content">
        <div class="sidebar">
            <h2>مؤسسة الرويعي</h2>
            <div class="nav-item active" onclick="showpage('dashboard', this)"><i class="fa-solid fa-house"></i> الرئيسية</div>
            <div class="nav-item" onclick="showpage('inventory', this)"><i class="fa-solid fa-box"></i> المخزون</div>
            <div class="nav-item" onclick="showpage('sales', this)"><i class="fa-solid fa-file-invoice"></i> المبيعات</div>
            <div class="nav-item" onclick="showpage('purchases', this)"><i class="fa-solid fa-cart-shopping"></i> المشتريات</div>
            <div class="nav-item" onclick="showpage('orders', this)"><i class="fa-solid fa-clock"></i> الطلبات</div>
            <div class="nav-item" onclick="showpage('reports', this)"><i class="fa-solid fa-chart-line"></i> التقارير</div>
        </div>

        <div class="main-content">
            <div id="dashboard" class="page active"><div class="card"><h2>الرئيسية</h2></div></div>
            <div id="inventory" class="page"><div class="card"><h2>المخزون</h2></div></div>
            <div id="sales" class="page"><div class="card"><h2>المبيعات</h2></div></div>
            <div id="purchases" class="page"><div class="card"><h2>المشتريات</h2></div></div>
            <div id="orders" class="page"><div class="card"><h2>الطلبات</h2></div></div>
            <div id="reports" class="page"><div class="card"><h2>التقارير</h2></div></div>
        </div>
    </div>

    <script>
        function login() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
        }
        function showpage(pageid, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.getElementById(pageid).classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
