<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الرويعي الذكي المتكامل</title>
    <style>
        :root { --primary: #0c2340; --accent: #d4af37; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; }
        
        /* القائمة الجانبية */
        .sidebar { width: 280px; background: var(--primary); color: white; height: 100vh; padding: 20px; }
        .group-title { color: var(--accent); font-weight: bold; margin-top: 20px; border-bottom: 1px solid #1e3a5f; padding-bottom: 5px; }
        .nav-item { padding: 10px; cursor: pointer; color: #ccc; }
        .nav-item:hover { color: white; background: #1e3a5f; }
        
        /* المحتوى */
        .content { flex: 1; padding: 30px; }
        .page { display: none; }
        .active { display: block; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .search-bar { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--accent); text-align:center;">الرويعي الذكي</h2>
    
    <div class="group-title">📦 المخزون والأصناف</div>
    <div class="nav-item" onclick="show('items')">قائمة الأصناف والبحث</div>
    <div class="nav-item" onclick="show('inventory')">مراقبة الجرد</div>

    <div class="group-title">🧾 الفواتير</div>
    <div class="nav-item" onclick="show('sales')">المبيعات</div>
    <div class="nav-item" onclick="show('purchases')">المشتريات</div>
    
    <div class="group-title">📊 التقارير</div>
    <div class="nav-item" onclick="show('reports')">التقارير المالية والضريبة</div>
</div>

<div class="content">
    <div id="items" class="page active">
        <h1>إدارة الأصناف (قاعدة البيانات)</h1>
        <input type="text" id="searchInput" class="search-bar" placeholder="ابحث عن رقم القطعة أو الاسم..." onkeyup="searchItems()">
        <table id="itemsTable">
            <thead><tr><th>رقم القطعة</th><th>اسم القطعة</th><th>الموديل</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <div id="inventory" class="page"><h1>مراقبة الجرد</h1><p>قسم الجرد.</p></div>
    <div id="sales" class="page"><h1>المبيعات</h1></div>
    <div id="purchases" class="page"><h1>المشتريات</h1></div>
    <div id="reports" class="page"><h1>التقارير والزكاة</h1></div>
</div>

<script>
    // قاعدة بيانات القطع المدمجة من ملفاتك
    const dbItems = [
        { partNo: "10110451310000", name: "OIL COLLER", model: "GAC MOTOR" },
        { partNo: "10120231310000", name: "WATER PUMP", model: "GAC" },
        { partNo: "10120221510000", name: "WATER PUMP", model: "GSE" }
    ];

    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function searchItems() {
        let query = document.getElementById('searchInput').value.toLowerCase();
        let tbody = document.querySelector('#itemsTable tbody');
        tbody.innerHTML = dbItems.filter(i => i.partNo.includes(query) || i.name.toLowerCase().includes(query))
            .map(i => `<tr><td>${i.partNo}</td><td>${i.name}</td><td>${i.model}</td></tr>`).join('');
    }

    // عرض البيانات عند التشغيل
    window.onload = searchItems;
</script>
</body>
</html>
