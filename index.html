<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الرويعي الذكي | المحرك الذكي</title>
    <style>
        :root { --primary: #0c2340; --accent: #d4af37; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; display: flex; }
        .sidebar { width: 280px; background: var(--primary); color: white; height: 100vh; padding: 20px; }
        .nav-item { padding: 12px; cursor: pointer; color: #cbd5e1; border-bottom: 1px solid #1e3a5f; }
        .nav-item:hover { color: white; background: #1e3a5f; }
        .content { flex: 1; padding: 30px; }
        .page { display: none; }
        .active { display: block; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--accent); text-align:center;">الرويعي الذكي</h2>
    <div class="nav-item" onclick="show('smartSearch')">🔍 محرك البحث الذكي (الشاصي)</div>
    <div class="nav-item" onclick="show('inventory')">📦 إدارة المخزون والأصناف</div>
    <div class="nav-item" onclick="show('sales')">🧾 تسجيل المبيعات</div>
</div>

<div class="content">
    <div id="smartSearch" class="page active">
        <div class="card">
            <h1>المحرك الذكي (رقم الشاصي)</h1>
            <input type="text" id="vinInput" placeholder="أدخل رقم الشاصي (VIN) للسيارة..." onkeyup="smartSearch()">
            <div id="smartResult" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="inventory" class="page">
        <div class="card">
            <h1>قائمة الأصناف</h1>
            <table id="partsTable"><thead><tr><th>رقم القطعة</th><th>الاسم</th><th>الموديل</th></tr></thead><tbody></tbody></table>
        </div>
    </div>
</div>

<script>
    // قاعدة بيانات الموديلات والكتالوجات (من ملف فهرس البحث)
    const catalogMap = { "GA6": "https://drive.google.com/file/d/1xkMbMK31AIIZXx-lhdwl0jmhSlx-_EtO/view", "GA8": "https://drive.google.com/file/d/1PIDaMVFK3aqChNzQ26vB800EWnAVLEXv/view" };
    
    // قاعدة بيانات القطع (من ملف SMART SYSTEM)
    const dbItems = [
        { partNo: "10110451310000", name: "OIL COLLER", model: "GA6" },
        { partNo: "10120231310000", name: "WATER PUMP", model: "GA8" }
    ];

    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function smartSearch() {
        let vin = document.getElementById('vinInput').value.toUpperCase();
        let resDiv = document.getElementById('smartResult');
        let model = vin.includes("6") ? "GA6" : "GA8"; 
        
        if (vin.length > 5) {
            let parts = dbItems.filter(p => p.model === model);
            resDiv.innerHTML = `<h4>السيارة المكتشفة: ${model}</h4>
                                <a href="${catalogMap[model]}" target="_blank" style="color:blue;">🔗 افتح كتالوج القطع</a>
                                <table>${parts.map(p => `<tr><td>${p.partNo}</td><td>${p.name}</td></tr>`).join('')}</table>`;
        }
    }

    // عرض الأصناف عند التشغيل
    window.onload = () => {
        let tbody = document.querySelector('#partsTable tbody');
        tbody.innerHTML = dbItems.map(i => `<tr><td>${i.partNo}</td><td>${i.name}</td><td>${i.model}</td></tr>`).join('');
    };
</script>
</body>
</html>
