<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الرويعي للبيع الذكي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 500px;">
        <h3 class="text-center mb-4">نظام الرويعي للبيع الذكي</h3>
        <div class="card p-4 shadow">
            <label>اختر المورد:</label>
            <select id="supplier" class="form-select mb-3">
                <option value="0.30">الجميح (30%)</option>
                <option value="0.20">هافال/جيتور (20%)</option>
                <option value="0.15">أخرى (15%)</option>
            </select>
            <label>سعر التكلفة:</label>
            <input type="number" id="cost" class="form-control mb-3" placeholder="أدخل التكلفة">
            <button onclick="calculate()" class="btn btn-primary w-100">احسب سعر البيع</button>
            <hr>
            <h4 id="result" class="text-center text-success"></h4>
        </div>
    </div>
    <script>
        function calculate() {
            let cost = parseFloat(document.getElementById('cost').value);
            let margin = parseFloat(document.getElementById('supplier').value);
            if(isNaN(cost)) return alert("الرجاء إدخال رقم صحيح");
            let total = cost + (cost * margin);
            document.getElementById('result').innerText = "سعر البيع المقترح: " + total.toFixed(2) + " ريال";
        }
    </script>
</body>
</html>
