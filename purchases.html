<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المشتريات</title>

<style>
body{background:#0F172A;font-family:Cairo;color:white;padding:30px}
.box{background:#111827;padding:25px;border-radius:20px}
input{width:100%;padding:12px;margin:8px 0;border:none;border-radius:10px;background:#1E293B;color:white}
button{padding:12px 20px;background:#16A34A;color:white;border:none;border-radius:10px;cursor:pointer}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #1E293B;text-align:center}
</style>

</head>

<body>

<div class="box">
<h2>نظام المشتريات</h2>

<input placeholder="اسم المورد">
<input placeholder="رقم القطعة">
<input placeholder="اسم القطعة">
<input type="number" placeholder="الكمية">
<input type="number" placeholder="سعر الشراء">

<button>حفظ</button>

<table>
<tr><th>المورد</th><th>القطعة</th><th>الكمية</th><th>السعر</th></tr>
<tr><td>مثال</td><td>فلتر</td><td>10</td><td>30</td></tr>
</table>

</div>

</body>
</html>
