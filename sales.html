<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; padding: 20px; }
        .system-card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #ff4d4d; max-width: 800px; margin: auto; }
        input, select { background: #333 !important; color: white !important; border: 1px solid #555 !important; }
        .btn-action { background: #ff4d4d; color: white; border: none; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="system-card">
        <a href="categories.html" class="text-danger">← عودة</a>
        <h4 class="mt-3">نظام المبيعات المتكامل</h4>
        
        <div class="row g-2 mb-4">
            <div class="col-md-3"><input type="text" id="itemCode" class="form-control" placeholder="رقم القطعة"></div>
            <div class="col-md-4"><input type="text" id="itemDesc" class="form-control" placeholder="الوصف"></div>
            <div class="col-md-2"><input type="number" id="qty" class="form-control" placeholder="الكمية"></div>
            <div class="col-md-3"><button class="btn-action w-100" onclick="addToInvoice()">إضافة للفاتورة</button></div>
        </div>

        <table class="table table-dark table-striped">
            <thead>
                <tr>
                    <th>القطعة</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th>
                </tr>
            </thead>
            <tbody id="invoiceBody"></tbody>
        </table>

        <div class="row mt-4">
            <div class="col-md-4">
                <select id="paymentType" class="form-control">
                    <option value="cash">كاش</option>
                    <option value="mada">شبكة</option>
                    <option value="transfer">تحويل بنكي</option>
                </select>
            </div>
            <div class="col-md-4">
                <button class="btn btn-warning w-100" onclick="holdOrder()">تعليق الفاتورة</button>
            </div>
            <div class="col-md-4">
                <button class="btn btn-success w-100" onclick="finalize()">إتمام البيع</button>
            </div>
        </div>
    </div>

    <script>
        function addToInvoice() {
            let desc = document.getElementById('itemDesc').value;
            let qty = document.getElementById('qty').value;
            let row = `<tr><td>${desc}</td><td>${qty}</td><td>-</td><td>-</td></tr>`;
            document.getElementById('invoiceBody').innerHTML += row;
        }
        function holdOrder() { alert("تم تعليق الفاتورة."); }
        function finalize() { alert("تمت عملية الدفع بنجاح."); }
    </script>
</body>
</html>
