<div class="system-card">
    <h4>الفاتورة والعمليات</h4>
    
    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>القطعة</th>
                <th>الكمية</th>
                <th>السعر</th>
                <th>الإجمالي</th>
            </tr>
        </thead>
        <tbody id="invoiceBody">
            </tbody>
    </table>

    <div class="row mt-3">
        <div class="col-6">
            <select id="paymentType" class="form-control bg-dark text-white">
                <option value="cash">كاش</option>
                <option value="mada">شبكة</option>
                <option value="transfer">تحويل بنكي</option>
            </select>
        </div>
        <div class="col-6">
            <button class="btn btn-warning w-100" onclick="holdInvoice()">تعليق الفاتورة</button>
        </div>
    </div>
    
    <button class="btn-calc mt-3" onclick="finalizeInvoice()">إتمام البيع</button>
</div>

<script>
    function holdInvoice() {
        alert("تم تعليق الفاتورة بنجاح، يمكنك البدء بعملية جديدة.");
        // هنا سنضيف لاحقاً كود الحفظ المؤقت
    }
    
    function finalizeInvoice() {
        let payment = document.getElementById('paymentType').value;
        alert("تمت العملية بنجاح عبر: " + payment);
    }
</script>
