<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام المبيعات - مؤسسة حسين الرويعي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* التنسيق الأساسي (النمط الأسود) */
        body { background: #0f0f0f; color: #fff; font-family: 'Arial', sans-serif; padding: 20px; }
        .invoice-box { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #ff4d4d; max-width: 900px; margin: auto; }
        
        input, select { background: #2b2b2b !important; color: #fff !important; border: 1px solid #ff4d4d !important; padding: 10px; border-radius: 8px; }
        th { background-color: #ff4d4d !important; color: white !important; text-align: center; }
        td { color: #fff; text-align: center; border: 1px solid #333; }
        
        /* تنسيق الطباعة (تحويل للنمط الرسمي) */
        @media print {
            body { background: white !important; }
            .invoice-box { background: white !important; border: none !important; color: black !important; box-shadow: none; }
            .no-print { display: none !important; }
            .print-header { display: block !important; text-align: center; border-bottom: 2px solid #000; margin-bottom: 20px; }
            th { background-color: #eee !important; color: black !important; border: 1px solid #000 !important; }
            td { color: black !important; border: 1px solid #000 !important; }
            h4, p { color: black !important; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>

<div class="invoice-box">
    <div class="print-header">
        <h3>مؤسسة حسين الرويعي لقطع الغيار</h3>
        <p>القطيف - التركية الصناعية | س.ت: 2053117431 | ضريبي: 310786465500003</p>
    </div>

    <h3 class="text-center text-danger no-print">نظام البيع والتحصيل</h3>

    <div class="row g-2 mb-4 no-print">
        <div class="col-md-3"><input type="text" id="itemNo" class="form-control" placeholder="رقم البند"></div>
        <div class="col-md-3"><input type="text" id="desc" class="form-control" placeholder="الوصف"></div>
        <div class="col-md-2"><input type="number" id="qty" class="form-control" placeholder="الكمية"></div>
        <div class="col-md-2"><input type="number" id="price" class="form-control" placeholder="السعر"></div>
        <div class="col-md-2"><button class="btn btn-danger w-100" onclick="addRow()">إضافة</button></div>
    </div>

    <table class="table table-bordered">
        <thead>
            <tr><th>م</th><th>رقم البند</th><th>الوصف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
        </thead>
        <tbody id="invoiceBody"></tbody>
    </table>

    <div class="row mt-4">
        <div class="col-6 text-center">
            <p class="no-print">يسعدنا تقييم تجربتك معنا:</p>
            <img src="https://chart.googleapis.com/chart?chs=80x80&cht=qr&chl=ضع_رابط_تقييم_خرائط_جوجل_هنا" alt="QR">
        </div>
        <div class="col-6 text-left">
            <p>المجموع: <span id="subtotal">0.00</span> ر.س</p>
            <p>ضريبة (15%): <span id="vat">0.00</span> ر.س</p>
            <h4 style="color: #ff4d4d;">الإجمالي: <span id="grandTotal">0.00</span> ر.س</h4>
        </div>
    </div>

    <div class="mt-4 text-center no-print">
        <button class="btn btn-success w-100" onclick="window.print()">طباعة الفاتورة الرسمية</button>
    </div>
</div>

<script>
    let counter = 1;
    function addRow() {
        let itemNo = document.getElementById('itemNo').value;
        let desc = document.getElementById('desc').value;
        let qty = parseFloat(document.getElementById('qty').value);
        let price = parseFloat(document.getElementById('price').value);
        let total = qty * price;
        if(!desc || !qty || !price) return alert("يرجى تعبئة الحقول");
        
        let row = `<tr><td>${counter++}</td><td>${itemNo}</td><td>${desc}</td><td>${qty}</td><td>${price}</td><td>${total.toFixed(2)}</td></tr>`;
        document.getElementById('invoiceBody').innerHTML += row;
        updateTotals(total);
    }

    function updateTotals(val) {
        let sub = parseFloat(document.getElementById('subtotal').innerText) + val;
        let vat = sub * 0.15;
        document.getElementById('subtotal').innerText = sub.toFixed(2);
        document.getElementById('vat').innerText = vat.toFixed(2);
        document.getElementById('grandTotal').innerText = (sub + vat).toFixed(2);
    }
</script>
</body>
</html>
