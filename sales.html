<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام البيع</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #121212; color: white; padding: 20px; }
        .calc-box { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #ff4d4d; max-width: 400px; margin: auto; }
        input { background: #333 !important; color: white !important; border: 1px solid #555 !important; }
    </style>
</head>
<body>
    <div class="calc-box">
        <a href="categories.html" class="text-danger">← عودة</a>
        <h4 class="mt-3 mb-4">حاسبة السعر</h4>
        <input type="number" id="cost" class="form-control mb-3" placeholder="سعر التكلفة">
        <button onclick="calculate()" class="btn btn-danger w-100">حساب سعر البيع</button>
        <h3 id="result" class="mt-4 text-center text-warning">0.00 ريال</h3>
    </div>

    <script>
        function calculate() {
            let cost = parseFloat(document.getElementById('cost').value);
            if (!isNaN(cost)) {
                let final = cost * 1.30;
                document.getElementById('result').innerText = final.toFixed(2) + " ريال";
            }
        }
    </script>
</body>
</html>
