<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المبيعات</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;800&display=swap" rel="stylesheet">

<style>

body{
background:#0F172A;
font-family:Cairo;
padding:30px;
color:white;
}

.container{
background:#111827;
padding:30px;
border-radius:25px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
background:#1E293B;
color:white;
}

button{
padding:15px 25px;
background:#2563EB;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:15px;
border-bottom:1px solid #1E293B;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>نظام المبيعات</h1>

<input type="text" placeholder="اسم العميل">

<input type="text" placeholder="رقم القطعة">

<input type="text" placeholder="اسم القطعة">

<input type="number" placeholder="السعر">

<input type="number" placeholder="الكمية">

<button>حفظ الفاتورة</button>

<table>

<tr>
<th>رقم الفاتورة</th>
<th>العميل</th>
<th>القطعة</th>
<th>السعر</th>
<th>الكمية</th>
</tr>

<tr>
<td>1001</td>
<td>محمد</td>
<td>فلتر زيت</td>
<td>45</td>
<td>2</td>
</tr>

</table>

</div>

</body>
</html>
