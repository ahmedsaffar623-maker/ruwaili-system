<script>
    function calc() {
        let name = document.querySelector('input[type="text"]').value;
        let cost = parseFloat(document.getElementById('cost').value);
        if(!isNaN(cost)) {
            let final = (cost * 1.30).toFixed(2);
            document.getElementById('finalPrice').innerText = final + " ريال";
            document.getElementById('resultBox').style.display = 'block';
            
            // إضافة العملية للسجل
            let log = document.getElementById('salesLog');
            let newItem = document.createElement('div');
            newItem.className = "border-bottom p-2 text-white";
            newItem.innerHTML = name + " : <span class='text-warning'>" + final + " ريال</span>";
            log.prepend(newItem);
        }
    }
</script>

<div class="mt-4">
    <h5>سجل مبيعات اليوم:</h5>
    <div id="salesLog" class="bg-dark p-2 rounded"></div>
</div>
