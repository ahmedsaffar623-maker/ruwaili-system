<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فاتورة مؤسسة حسين الرويعي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; padding: 20px; }
        .system-card { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 2px solid #ff4d4d; max-width: 900px; margin: auto; }
        
        /* تنسيق الطباعة */
        @media print {
            body { background: white !important; color: black !important; }
            .system-card { background: white !important; border: none !important; color: black !important; }
            .no-print { display: none !important; }
            .invoice-header { display: block !important; }
        }
        .invoice-header { display: none; text-align: center; margin-bottom: 20px; color: black; }

        input, select { background: #2b2b2b !important; color: #fff !important; border: 1px solid #ff4d4d !important; border-radius: 10px; padding: 12px; }
        label { color: #ff4d4d; font-weight: bold; margin-bottom: 5px; display: block; }
        .btn-add { background: #ff4d4d; color: white; width: 100%; border: none; padding: 12px; border-radius: 10px; font-weight: bold; }
        .btn-pay { background: #28a745; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; }
    </style>
</head>
<body>

<div class="system-card">
    <div class="invoice-header">
        <h3>مؤسسة حسين الرويعي لقطع الغيار</h3>
        <p>القطيف - التركية الصناعية | س.ت: 2053117431 | ضريبي: 310786465500003</p>
        <hr>
    </div>

    <a href="categories.html" class="text-danger mb-3 d-block no-print">← العودة للرئيسية</a>
    <h3 class="text-center mb-4 no-print">نظام البيع والتحصيل</h3>
    
    <div class="row g-3 mb-4 no-print">
        <div class="col-md-3"><label>رقم القطعة:</label><input type="text" id="itemCode" class="form-control"></div>
        <div class="col-md-4"><label>الوصف:</label><input type="text" id="itemDesc" class="form-control"></div>
        <div class="col-md-2"><label>الكمية:</label><input type="number" id="qty" class="form-control" value="1"></div>
        <div class="col-md-3"><label>&nbsp;</label><button class="btn-add" onclick="addToInvoice()">إضافة</button></div>
    </div>

    <table class="table table-bordered text-center">
        <thead>
            <tr><th>الوصف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
        </thead>
        <tbody id="invoiceBody"></tbody>
    </table>

    <div class="row mt-4 no-print">
        <div class="col-md-6">
            <select id="paymentType" class="form-control">
                <option value="cash">كاش</option>
                <option value="mada">شبكة (POS)</option>
                <option value="transfer">تحويل بنكي</option>
            </select>
        </div>
        <div class="col-md-6">
            <button class="btn-pay" onclick="finalize()">إتمام البيع والطباعة</button>
        </div>
    </div>

    <div class="text-center mt-5">
        <div class="text-center mt-5">
    <p style="font-weight: bold; color: black;">يسعدنا تقييم تجربتك معنا</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://maps.app.goo.gl/3fHSzjFQoZrZTPra6" alt="QR Code" style="width: 120px; height: 120px;">
    <p style="font-size: 12px; color: gray;">امسح الباركود للتقييم</p>
</div>

    </div>
</div>

<script>
    function addToInvoice() {
        let desc = document.getElementById('itemDesc').value;
        let qty = document.getElementById('qty').value;
        if(desc === "") return;
        let row = `<tr><td>${desc}</td><td>${qty}</td><td>---</td><td>---</td></tr>`;
        document.getElementById('invoiceBody').innerHTML += row;
        document.getElementById('itemDesc').value = "";
    }

    function finalize() {
        if(document.getElementById('paymentType').value === 'mada') {
            let auth = prompt("أدخل رقم تفويض الشبكة:");
            if(!auth) return;
        }
        window.print();
    }
</script>

</body>
</html>
