<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام مبيعات مؤسسة الرويعي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: #fff; font-family: sans-serif; padding: 20px; }
        .system-card { background: #1a1a1a; padding: 25px; border-radius: 20px; border: 2px solid #ff4d4d; max-width: 900px; margin: auto; }
        input, select { background: #2b2b2b !important; color: #fff !important; border: 1px solid #ff4d4d !important; border-radius: 10px; padding: 12px; }
        label { color: #ff4d4d; font-weight: bold; margin-bottom: 5px; display: block; }
        .table-dark { background: #222; border-radius: 10px; overflow: hidden; }
        .btn-add { background: #ff4d4d; color: white; width: 100%; border: none; padding: 12px; border-radius: 10px; font-weight: bold; }
        .btn-pay { background: #28a745; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; }
        .btn-hold { background: #ffc107; color: black; border: none; padding: 12px; border-radius: 10px; width: 100%; }
    </style>
</head>
<body>

<div class="system-card">
    <a href="categories.html" class="text-danger mb-3 d-block">← العودة للرئيسية</a>
    <h3 class="text-center mb-4">نظام البيع والتحصيل</h3>
    
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <label>رقم القطعة:</label>
            <input type="text" id="itemCode" class="form-control" placeholder="رقم...">
        </div>
        <div class="col-md-4">
            <label>الوصف:</label>
            <input type="text" id="itemDesc" class="form-control" placeholder="اسم القطعة...">
        </div>
        <div class="col-md-2">
            <label>الكمية:</label>
            <input type="number" id="qty" class="form-control" value="1">
        </div>
        <div class="col-md-3">
            <label>&nbsp;</label>
            <button class="btn-add" onclick="addToInvoice()">إضافة للفاتورة</button>
        </div>
    </div>

    <table class="table table-dark table-striped text-center">
        <thead>
            <tr><th>القطعة</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr>
        </thead>
        <tbody id="invoiceBody"></tbody>
    </table>

    <div class="row mt-4">
        <div class="col-md-4">
            <select id="paymentType" class="form-control">
                <option value="cash">كاش</option>
                <option value="mada">شبكة (POS)</option>
                <option value="transfer">تحويل بنكي</option>
            </select>
        </div>
        <div class="col-md-4">
            <button class="btn-hold" onclick="alert('تم تعليق الفاتورة بنجاح')">تعليق الفاتورة</button>
        </div>
        <div class="col-md-4">
            <button class="btn-pay" onclick="finalize()">إتمام البيع والطباعة</button>
        </div>
    </div>
</div>

<script>
    function addToInvoice() {
        let desc = document.getElementById('itemDesc').value;
        let qty = document.getElementById('qty').value;
        if(desc === "") return;
        let row = `<tr><td>${desc}</td><td>${qty}</td><td>---</td><td>---</td></tr>`;
        document.getElementById('invoiceBody').innerHTML += row;
        document.getElementById('itemDesc').value = "";
    }

    function finalize() {
        let type = document.getElementById('paymentType').value;
        if (type === 'mada') {
            let auth = prompt("يرجى إدخال رقم تفويض الشبكة:");
            if (!auth) { alert("يجب إدخال رقم التفويض!"); return; }
        }
        alert("تمت العملية بنجاح. سيتم الآن تجهيز الفاتورة للطباعة.");
        window.print();
    }
</script>

</body>
</html>
